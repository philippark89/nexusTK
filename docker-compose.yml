services:
  server:
    image: rtk-server:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "2000:2000"
      - "2001:2001"
      - "2005:2005"
    volumes:
      - "./rtk:/home/RTK/rtk"
      - "./rtklua:/home/RTK/rtklua"
      - "./rtkmaps:/home/RTK/rtkmaps"
      - "./database/scripts:/database/scripts"
      - "./database/history:/home/RTK/database/history"

  database:
    image: mysql:8.0
    restart: always
    command: --default-authentication-plugin=mysql_native_password --skip-ssl --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --net-read-timeout=600 --net-write-timeout=600
    environment:
      MYSQL_ROOT_PASSWORD: 'definitelyChangeMe'
      MYSQL_USER: 'rtk'
      MYSQL_PASSWORD: 'changeMe'
      MYSQL_DATABASE: 'RTK'
    ports:
      - "3306:3306"
    volumes:
      - "db-data:/var/lib/mysql"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "rtk", "-pchangeMe"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  db-data:
